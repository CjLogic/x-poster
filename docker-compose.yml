version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x-poster
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - X_CONSUMER_KEY=${X_CONSUMER_KEY}
      - X_CONSUMER_SECRET=${X_CONSUMER_SECRET}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN}
      - X_ACCESS_TOKEN_SECRET=${X_ACCESS_TOKEN_SECRET}
    volumes:
      - xposter_data:/app/content
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  xposter_data:
